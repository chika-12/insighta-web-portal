<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insighta Labs+</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #080b0f;
        --surface: #0e1318;
        --border: #1c2530;
        --accent: #00e5a0;
        --text: #e8edf2;
        --muted: #4a5a6a;
        --danger: #ff4d6d;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Mono', monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 229, 160, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 229, 160, 0.03) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
      }
      body::after {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(0, 229, 160, 0.07) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .corner {
        position: fixed;
        font-size: 10px;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .corner.tl {
        top: 24px;
        left: 24px;
      }
      .corner.br {
        bottom: 24px;
        right: 24px;
      }
      .card {
        position: relative;
        z-index: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 56px 48px;
        width: 420px;
        animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        animation: scan 3s ease-in-out infinite;
      }
      @keyframes scan {
        0%,
        100% {
          opacity: 0;
          transform: scaleX(0);
        }
        50% {
          opacity: 1;
          transform: scaleX(1);
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent);
        border: 1px solid var(--accent);
        padding: 4px 10px;
        margin-bottom: 32px;
      }
      h1 {
        font-family: 'Syne', sans-serif;
        font-size: 38px;
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 12px;
      }
      h1 span {
        color: var(--accent);
      }
      .subtitle {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.8;
        margin-bottom: 40px;
      }
      .divider {
        height: 1px;
        background: var(--border);
        margin-bottom: 32px;
      }
      .btn-github {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        padding: 14px 24px;
        background: var(--accent);
        color: #080b0f;
        border: none;
        font-family: 'DM Mono', monospace;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-github:hover {
        background: #00ffc0;
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(0, 229, 160, 0.25);
      }
      .footer-note {
        margin-top: 20px;
        font-size: 10px;
        color: var(--muted);
        text-align: center;
      }
      .error-msg {
        display: none;
        margin-top: 16px;
        padding: 10px 14px;
        background: rgba(255, 77, 109, 0.1);
        border: 1px solid rgba(255, 77, 109, 0.3);
        color: var(--danger);
        font-size: 11px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <span class="corner tl">INSIGHTA // v3.0</span>
    <span class="corner br">SECURE AUTH PORTAL</span>
    <div class="card">
      <div class="badge">Profile Intelligence</div>
      <h1>Insighta<br /><span>Labs+</span></h1>
      <p class="subtitle">
        Authenticated access to the profile intelligence<br />platform. Secure
        OAuth via GitHub required.
      </p>
      <div class="divider"></div>
      <button class="btn-github" onclick="login()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
          />
        </svg>
        Continue with GitHub
      </button>
      <div class="error-msg" id="error"></div>
      <p class="footer-note">
        Role-based access — admin features require elevated privileges
      </p>
    </div>
    <script src="./js/auth.js"></script>
  </body>
</html>
