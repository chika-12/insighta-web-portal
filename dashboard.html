<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insighta Labs+ — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #080b0f;
        --surface: #0e1318;
        --surface2: #121920;
        --border: #1c2530;
        --accent: #00e5a0;
        --accent-dim: rgba(0, 229, 160, 0.08);
        --text: #e8edf2;
        --muted: #4a5a6a;
        --danger: #ff4d6d;
        --danger-dim: rgba(255, 77, 109, 0.08);
        --warn: #f5a623;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Mono', monospace;
        min-height: 100vh;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 229, 160, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 229, 160, 0.02) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
        z-index: 0;
      }

      /* ── Topbar ── */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(8, 11, 15, 0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        height: 60px;
      }
      .logo {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 18px;
      }
      .logo span {
        color: var(--accent);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .user-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 6px 12px;
        font-size: 11px;
        color: var(--text);
      }
      .user-pill .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 2s infinite;
      }
      .role-badge {
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 2px 7px;
        border: 1px solid;
      }
      .role-badge.admin {
        color: var(--warn);
        border-color: var(--warn);
        background: rgba(245, 166, 35, 0.08);
      }
      .role-badge.analyst {
        color: var(--accent);
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      .btn-sm {
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.05em;
        padding: 6px 14px;
        border: 1px solid var(--border);
        background: none;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-sm:hover {
        border-color: var(--danger);
        color: var(--danger);
        background: var(--danger-dim);
      }

      /* ── Main ── */
      .main {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 0 auto;
        padding: 40px 32px;
      }

      /* ── Stats ── */
      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1px;
        background: var(--border);
        border: 1px solid var(--border);
        margin-bottom: 40px;
      }
      .stat {
        background: var(--surface);
        padding: 20px 24px;
        transition: background 0.2s;
      }
      .stat:hover {
        background: var(--surface2);
      }
      .stat-label {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .stat-value {
        font-family: 'Syne', sans-serif;
        font-size: 26px;
        font-weight: 700;
        color: var(--accent);
      }

      /* ── Section header ── */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .section-title {
        font-family: 'Syne', sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .section-title span {
        color: var(--accent);
        margin-right: 8px;
      }

      /* ── Search & Filters ── */
      .controls {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 20px;
        margin-bottom: 24px;
      }
      .search-row {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
      }
      .input-wrap {
        position: relative;
        flex: 1;
      }
      .input-wrap::before {
        content: '//';
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 11px;
        pointer-events: none;
      }
      input[type='text'],
      select {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        padding: 10px 12px 10px 34px;
        outline: none;
        transition: border-color 0.2s;
        appearance: none;
      }
      select {
        padding-left: 12px;
        cursor: pointer;
      }
      input[type='text']::placeholder {
        color: var(--muted);
      }
      input[type='text']:focus,
      select:focus {
        border-color: var(--accent);
      }
      .filter-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
      }
      .filter-row select {
        font-size: 11px;
      }
      .btn-primary {
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        letter-spacing: 0.06em;
        padding: 10px 20px;
        background: var(--accent);
        color: #080b0f;
        border: none;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .btn-primary:hover {
        background: #00ffc0;
        transform: translateY(-1px);
      }
      .btn-outline {
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        letter-spacing: 0.06em;
        padding: 10px 20px;
        background: none;
        color: var(--text);
        border: 1px solid var(--border);
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .btn-outline:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-danger {
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        letter-spacing: 0.06em;
        padding: 10px 20px;
        background: var(--danger-dim);
        color: var(--danger);
        border: 1px solid rgba(255, 77, 109, 0.3);
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .btn-danger:hover {
        background: rgba(255, 77, 109, 0.2);
      }
      .btn-warn {
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        letter-spacing: 0.06em;
        padding: 10px 20px;
        background: rgba(245, 166, 35, 0.08);
        color: var(--warn);
        border: 1px solid rgba(245, 166, 35, 0.3);
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .btn-warn:hover {
        background: rgba(245, 166, 35, 0.18);
      }
      .actions-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }

      /* ── Table ── */
      .table-wrap {
        border: 1px solid var(--border);
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      thead {
        background: var(--surface2);
      }
      th {
        padding: 12px 16px;
        text-align: left;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 400;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: var(--surface);
      }
      .gender-badge {
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 2px 8px;
        border: 1px solid;
      }
      .gender-badge.female {
        color: #f472b6;
        border-color: rgba(244, 114, 182, 0.4);
        background: rgba(244, 114, 182, 0.08);
      }
      .gender-badge.male {
        color: #60a5fa;
        border-color: rgba(96, 165, 250, 0.4);
        background: rgba(96, 165, 250, 0.08);
      }
      .age-group {
        font-size: 10px;
        color: var(--muted);
      }
      .prob-bar {
        height: 3px;
        background: var(--border);
        width: 60px;
        display: inline-block;
        vertical-align: middle;
        margin-left: 6px;
      }
      .prob-fill {
        height: 100%;
        background: var(--accent);
      }
      .action-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        font-family: 'DM Mono', monospace;
        font-size: 10px;
        padding: 4px 10px;
        cursor: pointer;
        transition: all 0.15s;
        margin-right: 4px;
      }
      .action-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .action-btn.del:hover {
        border-color: var(--danger);
        color: var(--danger);
      }

      /* ── Pagination ── */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 24px;
        font-size: 11px;
        color: var(--muted);
      }
      .page-btns {
        display: flex;
        gap: 8px;
      }
      .page-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        padding: 6px 14px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .page-btn:hover:not(:disabled) {
        border-color: var(--accent);
        color: var(--accent);
      }
      .page-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 999;
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 12px 20px;
        font-size: 12px;
        min-width: 260px;
        transform: translateY(80px);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
      .toast.success {
        border-color: var(--accent);
        color: var(--accent);
      }
      .toast.error {
        border-color: var(--danger);
        color: var(--danger);
      }

      /* ── Modal ── */
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(8, 11, 15, 0.85);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }
      .overlay.open {
        display: flex;
      }
      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 40px;
        width: 480px;
        position: relative;
      }
      .modal h3 {
        font-family: 'Syne', sans-serif;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 24px;
      }
      .modal h3 span {
        color: var(--accent);
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-label {
        display: block;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .form-input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        padding: 10px 12px;
        outline: none;
        transition: border-color 0.2s;
      }
      .form-input:focus {
        border-color: var(--accent);
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 24px;
      }
      .close-modal {
        position: absolute;
        top: 16px;
        right: 16px;
        background: none;
        border: none;
        color: var(--muted);
        font-size: 18px;
        cursor: pointer;
        line-height: 1;
      }
      .close-modal:hover {
        color: var(--text);
      }

      /* ── Profile detail panel ── */
      .detail-panel {
        display: none;
        position: fixed;
        right: 0;
        top: 60px;
        bottom: 0;
        width: 380px;
        background: var(--surface);
        border-left: 1px solid var(--border);
        z-index: 150;
        padding: 32px;
        overflow-y: auto;
        animation: slideIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .detail-panel.open {
        display: block;
      }
      @keyframes slideIn {
        from {
          transform: translateX(100%);
        }
        to {
          transform: translateX(0);
        }
      }
      .panel-close {
        position: absolute;
        top: 16px;
        right: 16px;
        background: none;
        border: none;
        color: var(--muted);
        font-size: 20px;
        cursor: pointer;
      }
      .panel-close:hover {
        color: var(--text);
      }
      .detail-label {
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .detail-value {
        font-size: 13px;
        margin-bottom: 20px;
        word-break: break-all;
      }
      .detail-divider {
        height: 1px;
        background: var(--border);
        margin: 20px 0;
      }

      /* ── Loading ── */
      .loading {
        text-align: center;
        padding: 60px;
        color: var(--muted);
        font-size: 12px;
      }
      .loading::after {
        content: '...';
        animation: dots 1.2s infinite;
      }
      @keyframes dots {
        0%,
        100% {
          content: '.';
        }
        33% {
          content: '..';
        }
        66% {
          content: '...';
        }
      }
      .empty {
        text-align: center;
        padding: 60px;
        color: var(--muted);
        font-size: 12px;
      }

      /* ── Admin-only visibility ── */
      .admin-only {
        display: none;
      }
      body.is-admin .admin-only {
        display: inline-flex;
      }
      body.is-admin .admin-only-block {
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Topbar -->
    <nav class="topbar">
      <div class="logo">Insighta <span>Labs+</span></div>
      <div class="topbar-right">
        <div class="user-pill">
          <span class="dot"></span>
          <span id="username-display">loading...</span>
          <span class="role-badge analyst" id="role-badge">analyst</span>
        </div>
        <button class="btn-sm" onclick="logout()">Logout</button>
      </div>
    </nav>

    <!-- Main -->
    <div class="main">
      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-label">Total Profiles</div>
          <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Current Page</div>
          <div class="stat-value" id="stat-page">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Total Pages</div>
          <div class="stat-value" id="stat-pages">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Results Shown</div>
          <div class="stat-value" id="stat-shown">—</div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="search-row">
          <div class="input-wrap" style="flex: 1">
            <input
              type="text"
              id="search-input"
              placeholder='Natural language e.g. "elderly women from ghana"'
              onkeydown="if (event.key === 'Enter') applySearch();"
            />
          </div>
          <button class="btn-primary" onclick="applySearch()">Search</button>
          <button class="btn-outline" onclick="clearAll()">Clear</button>
        </div>
        <div class="filter-row">
          <select id="filter-gender" onchange="applyFilters()">
            <option value="">All Genders</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
          <select id="filter-age_group" onchange="applyFilters()">
            <option value="">All Age Groups</option>
            <option value="child">Child</option>
            <option value="teenager">Teenager</option>
            <option value="adult">Adult</option>
            <option value="senior">Senior</option>
          </select>
          <select id="filter-country_id" onchange="applyFilters()">
            <option value="">All Countries</option>
            <option value="NG">Nigeria</option>
            <option value="GH">Ghana</option>
            <option value="KE">Kenya</option>
            <option value="ZA">South Africa</option>
            <option value="ET">Ethiopia</option>
            <option value="EG">Egypt</option>
            <option value="TZ">Tanzania</option>
            <option value="UG">Uganda</option>
            <option value="SN">Senegal</option>
            <option value="CI">Côte d'Ivoire</option>
          </select>
          <select id="filter-sort" onchange="applyFilters()">
            <option value="-created_at">Newest First</option>
            <option value="created_at">Oldest First</option>
            <option value="age">Age ↑</option>
            <option value="-age">Age ↓</option>
            <option value="country_id">Country A-Z</option>
          </select>
          <select id="filter-limit" onchange="applyFilters()">
            <option value="10">10 per page</option>
            <option value="20">20 per page</option>
            <option value="50">50 per page</option>
          </select>
        </div>
      </div>

      <!-- Action buttons -->
      <div class="actions-row">
        <button class="btn-warn admin-only" onclick="openCreateModal()">
          + Create Profile
        </button>
        <button class="btn-outline admin-only" onclick="exportCSV()">
          ⬇ Export CSV
        </button>
      </div>

      <!-- Table -->
      <div class="section-header">
        <div class="section-title"><span>#</span>Profiles</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Gender</th>
              <th>Age Group</th>
              <th>Age</th>
              <th>Country</th>
              <th>Gender Prob.</th>
              <th>Country Prob.</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="profiles-body">
            <tr>
              <td colspan="9" class="loading">Fetching profiles</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="pagination">
        <span id="page-info">Page — of —</span>
        <div class="page-btns">
          <button class="page-btn" id="btn-prev" onclick="prevPage()" disabled>
            ← Prev
          </button>
          <button class="page-btn" id="btn-next" onclick="nextPage()" disabled>
            Next →
          </button>
        </div>
      </div>
    </div>

    <!-- Profile Detail Panel -->
    <div class="detail-panel" id="detail-panel">
      <button class="panel-close" onclick="closeDetail()">×</button>
      <div id="detail-content"></div>
    </div>

    <!-- Create Profile Modal (admin only) -->
    <div class="overlay" id="create-modal">
      <div class="modal">
        <button class="close-modal" onclick="closeCreateModal()">×</button>
        <h3>Create <span>Profile</span></h3>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input
              class="form-input"
              type="text"
              id="new-fname"
              placeholder="e.g. Amara"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input
              class="form-input"
              type="text"
              id="new-lname"
              placeholder="e.g. Osei"
            />
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Gender</label>
            <select class="form-input" id="new-gender">
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Age Group</label>
            <select class="form-input" id="new-age_group">
              <option value="child">Child</option>
              <option value="teenager">Teenager</option>
              <option value="adult">Adult</option>
              <option value="senior">Senior</option>
            </select>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Age</label>
            <input
              class="form-input"
              type="text"
              id="new-age"
              placeholder="e.g. 34"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Country ID (ISO)</label>
            <input
              class="form-input"
              type="text"
              id="new-country_id"
              placeholder="e.g. GH"
              maxlength="2"
            />
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Gender Probability</label>
            <input
              class="form-input"
              type="text"
              id="new-gender_probability"
              placeholder="0.0 – 1.0"
